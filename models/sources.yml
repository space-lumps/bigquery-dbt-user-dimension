# models/sources.yml
# 
# Declares all raw source tables referenced by the dbt models.
# Names are fully genericized (no proprietary identifiers) for this portfolio showcase.
# Real production data is not included or accessible here — this is for demonstration only.

version: 2

sources:
  - name: raw
    database: sample_user_warehouse          # Placeholder BigQuery project ID
    schema: bronze_raw                       # Placeholder raw layer schema
    tables:
      # Core user and identity tables
      - name: user_core
      - name: user_join_record
      - name: user_site
      - name: user_sponsor

      # Classroom / membership / invitation tables
      - name: classroom
      - name: classroom_invite_code
      - name: educator_classroom_membership
      - name: educator_invitation_record
      - name: learner_classroom_membership

      # Location / geo resolution tables
      - name: location_address_components
      - name: location_core
      - name: location_type

      # Sponsor / invite code tables
      - name: sponsor_invite_code